# ─────────────────────────────────────────────────────────────────────────────
# AMS Web — Azure Pipelines CI/CD  (optimized)
#
# Variable Group "ams-web-vars" in Azure DevOps Library:
#   ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD (secret)
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (secret, base64-encoded)
#   DEPLOY_PATH, API_ACR_IMAGE
#   DB_MONGODB_URI (secret), DB_MONGODB_DATABASE
#   ACCESS_TOKEN_SECRET (secret), REFRESH_TOKEN_SECRET (secret)
#   ALLOWED_ORIGINS
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - "*.md"
      - ".gitignore"
      - "docs/**"

pr:
  branches:
    include:
      - main
      - master

variables:
  - group: ams-web-vars
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: ADMIN_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-admin:$(IMAGE_TAG)
  - name: ADMIN_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-admin:latest
  - name: LECTURER_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:$(IMAGE_TAG)
  - name: LECTURER_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:latest
  # Enable BuildKit for faster, cached builds
  - name: DOCKER_BUILDKIT
    value: "1"

stages:
  # ───────────────────────────────────────────────────────────────────────────
  # Stage 1 — Build & Push (admin and lecturer in parallel, CI merged in)
  # No separate lint stage — ESLint runs inside the Docker build via npm run build
  # which catches import/syntax errors anyway. Saves one full agent spin-up per app.
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push to ACR"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    jobs:

      - job: BuildAdmin
        displayName: "Build & Push ams-admin"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1        # shallow clone — faster checkout

          - script: |
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin
            displayName: "Login to ACR"

          - script: |
              # Pull the previous latest image to use as cache source
              docker pull "$(ADMIN_LATEST)" || true
            displayName: "Pull cache image"

          - script: |
              docker build \
                --build-arg VITE_APP_BASE_NAME=/admin/ \
                --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
                --build-arg GENERATE_SOURCEMAP=false \
                --build-arg PUBLIC_URL= \
                --cache-from "$(ADMIN_LATEST)" \
                --tag "$(ADMIN_IMAGE)" \
                --tag "$(ADMIN_LATEST)" \
                --label "build=$(Build.BuildId)" \
                --label "commit=$(Build.SourceVersion)" \
                admin/
            displayName: "Build admin image"
            env:
              DOCKER_BUILDKIT: 1

          - script: |
              docker push "$(ADMIN_IMAGE)"
              docker push "$(ADMIN_LATEST)"
            displayName: "Push admin image"

      - job: BuildLecturer
        displayName: "Build & Push ams-lecturer"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin
            displayName: "Login to ACR"

          - script: |
              docker pull "$(LECTURER_LATEST)" || true
            displayName: "Pull cache image"

          - script: |
              docker build \
                --build-arg VITE_APP_BASE_NAME=/lecturer/ \
                --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
                --build-arg GENERATE_SOURCEMAP=false \
                --build-arg PUBLIC_URL= \
                --cache-from "$(LECTURER_LATEST)" \
                --tag "$(LECTURER_IMAGE)" \
                --tag "$(LECTURER_LATEST)" \
                --label "build=$(Build.BuildId)" \
                --label "commit=$(Build.SourceVersion)" \
                lecturer/
            displayName: "Build lecturer image"
            env:
              DOCKER_BUILDKIT: 1

          - script: |
              docker push "$(LECTURER_IMAGE)"
              docker push "$(LECTURER_LATEST)"
            displayName: "Push lecturer image"

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2 — Deploy to VM via SSH (main branch only)
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Server"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployWebStack
        displayName: "Deploy Web Stack"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - script: |
              echo "$(SSH_PRIVATE_KEY)" | base64 -d > /tmp/deploy_key
              chmod 600 /tmp/deploy_key
            displayName: "Setup SSH key"

          - script: |
              # Ensure deploy directories exist on VM
              ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
                  -i /tmp/deploy_key \
                  "$(SSH_USER)@$(SSH_HOST)" \
                  "mkdir -p $(DEPLOY_PATH)/proxy"

              # Copy compose file and nginx config in parallel
              scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
                  docker-compose.yml \
                  "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_PATH)/docker-compose.yml" &

              scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
                  proxy/nginx.conf \
                  "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_PATH)/proxy/nginx.conf" &

              wait   # wait for both scp to finish
            displayName: "Copy compose & nginx config to VM"

          - script: |
              ssh -o StrictHostKeyChecking=no -o BatchMode=yes \
                  -i /tmp/deploy_key \
                  "$(SSH_USER)@$(SSH_HOST)" bash << 'REMOTE'
              set -e
              cd "$(DEPLOY_PATH)"

              # Write .env
              cat > .env << ENVEOF
              PROXY_PORT=3000
              NODE_ENV=production
              APPLICATION_PORT=8080
              DB_MONGODB_URI=$(DB_MONGODB_URI)
              DB_MONGODB_DATABASE=$(DB_MONGODB_DATABASE)
              SLAT_ROUNDS=10
              ACCESS_TOKEN_SECRET=$(ACCESS_TOKEN_SECRET)
              REFRESH_TOKEN_SECRET=$(REFRESH_TOKEN_SECRET)
              ACCESS_TOKEN_TTL=1h
              REFRESH_TOKEN_TTL=30d
              REFRESH_TOKEN_COOKIE_TTL=3600
              ALLOWED_ORIGINS=$(ALLOWED_ORIGINS)
              ALLOWED_METHODS=["GET","HEAD","PUT","PATCH","POST","DELETE"]
              ALLOWED_HEADERS=["Origin","X-Requested-With","Content-Type","Accept","Authorization","X-Token"]
              ADMIN_VITE_APP_BASE_NAME=/admin/
              ADMIN_VITE_APP_VERSION=v$(IMAGE_TAG)
              ADMIN_PUBLIC_URL=
              ADMIN_GENERATE_SOURCEMAP=false
              LECTURER_VITE_APP_BASE_NAME=/lecturer/
              LECTURER_VITE_APP_VERSION=v$(IMAGE_TAG)
              LECTURER_PUBLIC_URL=
              LECTURER_GENERATE_SOURCEMAP=false
              ENVEOF

              # Login to ACR
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin

              # Pull all images in parallel
              docker pull "$(API_ACR_IMAGE)" &
              docker pull "$(ADMIN_IMAGE)" &
              docker pull "$(LECTURER_IMAGE)" &
              wait

              # Write compose override to use ACR images (no build on server)
              cat > docker-compose.override.yml << OVERRIDE
              services:
                ams-api:
                  image: $(API_ACR_IMAGE)
                  build: !reset null
                ams-admin:
                  image: $(ADMIN_IMAGE)
                  build: !reset null
                ams-lecturer:
                  image: $(LECTURER_IMAGE)
                  build: !reset null
              OVERRIDE

              # Remove any conflicting containers, then start fresh
              docker compose down --remove-orphans || true
              docker rm -f ams-api ams-admin ams-lecturer ams-proxy 2>/dev/null || true
              docker compose up -d --no-build --remove-orphans

              # Clean up old images
              docker image prune -f
              REMOTE
            displayName: "SSH deploy to VM"
            env:
              ACR_PASSWORD:         $(ACR_PASSWORD)
              ACR_LOGIN_SERVER:     $(ACR_LOGIN_SERVER)
              ACR_USERNAME:         $(ACR_USERNAME)
              DEPLOY_PATH:          $(DEPLOY_PATH)
              IMAGE_TAG:            $(IMAGE_TAG)
              ADMIN_IMAGE:          $(ADMIN_IMAGE)
              LECTURER_IMAGE:       $(LECTURER_IMAGE)
              API_ACR_IMAGE:        $(API_ACR_IMAGE)
              DB_MONGODB_URI:       $(DB_MONGODB_URI)
              DB_MONGODB_DATABASE:  $(DB_MONGODB_DATABASE)
              ACCESS_TOKEN_SECRET:  $(ACCESS_TOKEN_SECRET)
              REFRESH_TOKEN_SECRET: $(REFRESH_TOKEN_SECRET)
              ALLOWED_ORIGINS:      $(ALLOWED_ORIGINS)

          - script: rm -f /tmp/deploy_key
            displayName: "Cleanup SSH key"
            condition: always()
