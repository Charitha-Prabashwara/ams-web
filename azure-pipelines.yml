# ─────────────────────────────────────────────────────────────────────────────
# AMS Web — Azure Pipelines CI/CD (CLEAN PRODUCTION VERSION)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  - group: ams-web-vars

  - name: IMAGE_TAG
    value: $(Build.BuildId)

  - name: ADMIN_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-admin:$(IMAGE_TAG)

  - name: ADMIN_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-admin:latest

  - name: LECTURER_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:$(IMAGE_TAG)

  - name: LECTURER_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:latest

stages:

# ───────────────────────── CI ─────────────────────────
- stage: CI
  jobs:
    - job: LintAdmin
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
        - task: NodeTool@0
          inputs:
            versionSpec: "22.x"

        - script: npm install --legacy-peer-deps
          workingDirectory: admin

        - script: npm run lint
          workingDirectory: admin
          continueOnError: true

    - job: LintLecturer
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
        - task: NodeTool@0
          inputs:
            versionSpec: "22.x"

        - script: npm install --legacy-peer-deps
          workingDirectory: lecturer

        - script: npm run lint
          workingDirectory: lecturer
          continueOnError: true

# ───────────────────────── BUILD ─────────────────────────
- stage: Build
  dependsOn: CI
  condition: succeeded()

  jobs:
    - job: BuildAdmin
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
              --username "$(ACR_USERNAME)" --password-stdin
          displayName: "ACR Login"

        - script: |
            docker build \
              --build-arg VITE_APP_BASE_NAME=/admin/ \
              --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
              --tag "$(ADMIN_IMAGE)" \
              --tag "$(ADMIN_LATEST)" \
              admin/
          displayName: "Build Admin"

        - script: |
            docker push "$(ADMIN_IMAGE)"
            docker push "$(ADMIN_LATEST)"

    - job: BuildLecturer
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
              --username "$(ACR_USERNAME)" --password-stdin
          displayName: "ACR Login"

        - script: |
            docker build \
              --build-arg VITE_APP_BASE_NAME=/lecturer/ \
              --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
              --tag "$(LECTURER_IMAGE)" \
              --tag "$(LECTURER_LATEST)" \
              lecturer/
          displayName: "Build Lecturer"

        - script: |
            docker push "$(LECTURER_IMAGE)"
            docker push "$(LECTURER_LATEST)"

# ───────────────────────── DEPLOY ─────────────────────────
- stage: Deploy
  dependsOn: Build
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

  jobs:
    - job: Deploy
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: none

        # ───── SSH KEY ─────
        - script: |
            echo "$(SSH_PRIVATE_KEY)" | base64 -d > /tmp/deploy_key
            chmod 600 /tmp/deploy_key

        # ───── DEPLOY ─────
        - script: |
            ssh -o StrictHostKeyChecking=no \
                -i /tmp/deploy_key \
                "$(SSH_USER)@$(SSH_HOST)" bash << 'REMOTE'
            set -e

            echo "🔐 Logging into ACR..."
            echo "${ACR_PASSWORD}" | docker login "${ACR_LOGIN_SERVER}" \
              --username "${ACR_USERNAME}" --password-stdin

            echo "📦 Pulling images..."
            docker pull "${ADMIN_IMAGE}"
            docker pull "${LECTURER_IMAGE}"

            echo "📁 Setup folder..."
            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            echo "📝 Writing env..."
            cat > .env <<EOF
NODE_ENV=production
PROXY_PORT=3000
APPLICATION_PORT=8080
DB_MONGODB_URI=${DB_MONGODB_URI}
DB_MONGODB_DATABASE=${DB_MONGODB_DATABASE}
ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
EOF

            echo "🚀 Running stack..."
            docker stop ams-admin ams-lecturer ams-api || true
            docker rm ams-admin ams-lecturer ams-api || true

            docker run -d --name ams-admin -p 3001:80 ${ADMIN_IMAGE}
            docker run -d --name ams-lecturer -p 3002:80 ${LECTURER_IMAGE}

            REMOTE

        - script: rm -f /tmp/deploy_key
          condition: always()