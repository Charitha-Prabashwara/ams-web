# ─────────────────────────────────────────────────────────────────────────────
# AMS Web — Azure Pipelines CI/CD
# Builds: ams-admin, ams-lecturer (Vite/React → nginx)
# ams-api image comes from the ams-api repo pipeline (pulled via API_ACR_IMAGE)
#
# Variable Group "ams-web-vars" in Azure DevOps Library:
#
#   ACR_LOGIN_SERVER        myregistry.azurecr.io                   (plain)
#   ACR_USERNAME            <acr-username>                           (plain)
#   ACR_PASSWORD            <acr-password>                           (secret 🔒)
#   SSH_HOST                <vm-ip or hostname>                      (plain)
#   SSH_USER                azureuser                                (plain)
#   SSH_PRIVATE_KEY         <full PEM key — base64 encoded>          (secret 🔒)
#   DEPLOY_PATH             /home/azureuser/ams-web                  (plain)
#   API_ACR_IMAGE           myregistry.azurecr.io/ams-api:latest    (plain)
#   DB_MONGODB_URI          mongodb+srv://...                        (secret 🔒)
#   DB_MONGODB_DATABASE     AMS                                      (plain)
#   ACCESS_TOKEN_SECRET     <random string>                          (secret 🔒)
#   REFRESH_TOKEN_SECRET    <random string>                          (secret 🔒)
#   ALLOWED_ORIGINS         ["https://yourdomain.com"]               (plain)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - "*.md"
      - ".gitignore"
      - "docs/**"

pr:
  branches:
    include:
      - main
      - master

variables:
  - group: ams-web-vars
  - name: IMAGE_TAG
    value: $(Build.BuildId)
  - name: ADMIN_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-admin:$(IMAGE_TAG)
  - name: ADMIN_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-admin:latest
  - name: LECTURER_IMAGE
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:$(IMAGE_TAG)
  - name: LECTURER_LATEST
    value: $(ACR_LOGIN_SERVER)/ams-lecturer:latest

stages:
  # ───────────────────────────────────────────────────────────────────────────
  # Stage 1 — CI: Lint both frontends in parallel
  # ───────────────────────────────────────────────────────────────────────────
  - stage: CI
    displayName: "CI — Lint"
    jobs:
      - job: LintAdmin
        displayName: "Lint Admin"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: "Use Node 22"
            inputs:
              versionSpec: "22.x"

          - script: npm install --legacy-peer-deps
            displayName: "Install dependencies"
            workingDirectory: admin

          - script: npm run lint
            displayName: "Lint (ESLint)"
            workingDirectory: admin
            continueOnError: true

      - job: LintLecturer
        displayName: "Lint Lecturer"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: "Use Node 22"
            inputs:
              versionSpec: "22.x"

          - script: npm install --legacy-peer-deps
            displayName: "Install dependencies"
            workingDirectory: lecturer

          - script: npm run lint
            displayName: "Lint (ESLint)"
            workingDirectory: lecturer
            continueOnError: true

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2 — Build & Push both frontend images to ACR (parallel)
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push to ACR"
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BuildAdmin
        displayName: "Build ams-admin"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin
            displayName: "Login to ACR"

          - script: |
              docker build \
                --build-arg VITE_APP_BASE_NAME=/admin/ \
                --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
                --build-arg GENERATE_SOURCEMAP=false \
                --build-arg PUBLIC_URL= \
                --tag "$(ADMIN_IMAGE)" \
                --tag "$(ADMIN_LATEST)" \
                --label "build=$(Build.BuildId)" \
                --label "commit=$(Build.SourceVersion)" \
                admin/
            displayName: "Build admin image"

          - script: |
              docker push "$(ADMIN_IMAGE)"
              docker push "$(ADMIN_LATEST)"
            displayName: "Push admin image to ACR"

      - job: BuildLecturer
        displayName: "Build ams-lecturer"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin
            displayName: "Login to ACR"

          - script: |
              docker build \
                --build-arg VITE_APP_BASE_NAME=/lecturer/ \
                --build-arg VITE_APP_VERSION=v$(Build.BuildId) \
                --build-arg GENERATE_SOURCEMAP=false \
                --build-arg PUBLIC_URL= \
                --tag "$(LECTURER_IMAGE)" \
                --tag "$(LECTURER_LATEST)" \
                --label "build=$(Build.BuildId)" \
                --label "commit=$(Build.SourceVersion)" \
                lecturer/
            displayName: "Build lecturer image"

          - script: |
              docker push "$(LECTURER_IMAGE)"
              docker push "$(LECTURER_LATEST)"
            displayName: "Push lecturer image to ACR"

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3 — Deploy full stack to server via SSH
  # Copies docker-compose.yml + proxy/nginx.conf to the VM, then pulls and
  # restarts all containers.
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Server"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployWebStack
        displayName: "Deploy Web Stack"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self   # need repo files to copy compose + nginx config

          - script: |
              echo "$(SSH_PRIVATE_KEY)" | base64 -d > /tmp/deploy_key
              chmod 600 /tmp/deploy_key
            displayName: "Setup SSH key"

          # ── Copy compose file and nginx config to the VM ──────────────────
          - script: |
              ssh -o StrictHostKeyChecking=no \
                  -o BatchMode=yes \
                  -i /tmp/deploy_key \
                  "$(SSH_USER)@$(SSH_HOST)" \
                  "mkdir -p $(DEPLOY_PATH)/proxy"

              # Copy docker-compose.yml
              scp -o StrictHostKeyChecking=no \
                  -i /tmp/deploy_key \
                  docker-compose.yml \
                  "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_PATH)/docker-compose.yml"

              # Copy proxy nginx config
              scp -o StrictHostKeyChecking=no \
                  -i /tmp/deploy_key \
                  proxy/nginx.conf \
                  "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_PATH)/proxy/nginx.conf"
            displayName: "Copy compose & nginx config to VM"

          # ── Write .env and deploy on the VM ──────────────────────────────
          - script: |
              ssh -o StrictHostKeyChecking=no \
                  -o BatchMode=yes \
                  -i /tmp/deploy_key \
                  "$(SSH_USER)@$(SSH_HOST)" bash << 'REMOTE'
              set -e
              cd "$(DEPLOY_PATH)"

              # Write .env with all runtime variables
              cat > .env << ENVEOF
              PROXY_PORT=3000
              NODE_ENV=production
              APPLICATION_PORT=8080
              DB_MONGODB_URI=$(DB_MONGODB_URI)
              DB_MONGODB_DATABASE=$(DB_MONGODB_DATABASE)
              SLAT_ROUNDS=10
              ACCESS_TOKEN_SECRET=$(ACCESS_TOKEN_SECRET)
              REFRESH_TOKEN_SECRET=$(REFRESH_TOKEN_SECRET)
              ACCESS_TOKEN_TTL=1h
              REFRESH_TOKEN_TTL=30d
              REFRESH_TOKEN_COOKIE_TTL=3600
              ALLOWED_ORIGINS=$(ALLOWED_ORIGINS)
              ALLOWED_METHODS=["GET","HEAD","PUT","PATCH","POST","DELETE"]
              ALLOWED_HEADERS=["Origin","X-Requested-With","Content-Type","Accept","Authorization","X-Token"]
              ADMIN_VITE_APP_BASE_NAME=/admin/
              ADMIN_VITE_APP_VERSION=v$(IMAGE_TAG)
              ADMIN_PUBLIC_URL=
              ADMIN_GENERATE_SOURCEMAP=false
              LECTURER_VITE_APP_BASE_NAME=/lecturer/
              LECTURER_VITE_APP_VERSION=v$(IMAGE_TAG)
              LECTURER_PUBLIC_URL=
              LECTURER_GENERATE_SOURCEMAP=false
              ENVEOF

              # Login to ACR
              echo "$(ACR_PASSWORD)" | docker login "$(ACR_LOGIN_SERVER)" \
                --username "$(ACR_USERNAME)" --password-stdin

              # Pull all images from ACR
              docker pull "$(API_ACR_IMAGE)"
              docker pull "$(ADMIN_IMAGE)"
              docker pull "$(LECTURER_IMAGE)"

              # Write compose override — use pre-built ACR images, skip build:
              cat > docker-compose.override.yml << OVERRIDE
              services:
                ams-api:
                  image: $(API_ACR_IMAGE)
                  build: !reset null
                ams-admin:
                  image: $(ADMIN_IMAGE)
                  build: !reset null
                ams-lecturer:
                  image: $(LECTURER_IMAGE)
                  build: !reset null
              OVERRIDE

              # Restart full stack
              docker compose up -d --no-build --remove-orphans

              # Prune dangling images to save disk
              docker image prune -f
              REMOTE
            displayName: "SSH deploy to VM"
            env:
              ACR_PASSWORD:         $(ACR_PASSWORD)
              ACR_LOGIN_SERVER:     $(ACR_LOGIN_SERVER)
              ACR_USERNAME:         $(ACR_USERNAME)
              DEPLOY_PATH:          $(DEPLOY_PATH)
              IMAGE_TAG:            $(IMAGE_TAG)
              ADMIN_IMAGE:          $(ADMIN_IMAGE)
              LECTURER_IMAGE:       $(LECTURER_IMAGE)
              API_ACR_IMAGE:        $(API_ACR_IMAGE)
              DB_MONGODB_URI:       $(DB_MONGODB_URI)
              DB_MONGODB_DATABASE:  $(DB_MONGODB_DATABASE)
              ACCESS_TOKEN_SECRET:  $(ACCESS_TOKEN_SECRET)
              REFRESH_TOKEN_SECRET: $(REFRESH_TOKEN_SECRET)
              ALLOWED_ORIGINS:      $(ALLOWED_ORIGINS)

          - script: rm -f /tmp/deploy_key
            displayName: "Cleanup SSH key"
            condition: always()
