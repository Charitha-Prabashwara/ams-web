services:

  # ─── Backend API ─────────────────────────────────────────────────────────────
  ams-api:
    build:
      context: ../ams-api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      NODE_ENV:                  ${NODE_ENV:-production}
      APPLICATION_PORT:          ${APPLICATION_PORT:-8080}
      DB_MONGODB_URI:            ${DB_MONGODB_URI}
      DB_MONGODB_DATABASE:       ${DB_MONGODB_DATABASE}
      SLAT_ROUNDS:               ${SLAT_ROUNDS:-10}
      ACCESS_TOKEN_SECRET:       ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET:      ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_TTL:          ${ACCESS_TOKEN_TTL:-1h}
      REFRESH_TOKEN_TTL:         ${REFRESH_TOKEN_TTL:-30d}
      REFRESH_TOKEN_COOKIE_TTL:  ${REFRESH_TOKEN_COOKIE_TTL:-3600}
      ALLOWED_ORIGINS:           ${ALLOWED_ORIGINS}
      ALLOWED_METHODS:           ${ALLOWED_METHODS}
      ALLOWED_HEADERS:           ${ALLOWED_HEADERS}
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ams-network

  # ─── Admin Frontend ──────────────────────────────────────────────────────────
  ams-admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_NAME: ${ADMIN_VITE_APP_BASE_NAME:-/admin/}
        VITE_APP_VERSION:   ${ADMIN_VITE_APP_VERSION:-v1.5.0}
        PUBLIC_URL:         ${ADMIN_PUBLIC_URL:-}
        GENERATE_SOURCEMAP: ${ADMIN_GENERATE_SOURCEMAP:-false}
    image: ams-web/admin:latest
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ams-network

  # ─── Lecturer Frontend ───────────────────────────────────────────────────────
  ams-lecturer:
    build:
      context: ./lecturer
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_NAME: ${LECTURER_VITE_APP_BASE_NAME:-/lecturer/}
        VITE_APP_VERSION:   ${LECTURER_VITE_APP_VERSION:-v1.5.0}
        PUBLIC_URL:         ${LECTURER_PUBLIC_URL:-}
        GENERATE_SOURCEMAP: ${LECTURER_GENERATE_SOURCEMAP:-false}
    image: ams-web/lecturer:latest
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ams-network

  # ─── Nginx Reverse Proxy (single entry point) ────────────────────────────────
  ams-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-3000}:3000"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ams-api
      - ams-admin
      - ams-lecturer
    networks:
      - ams-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  api_logs:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ams-network:
    driver: bridge
