services:

  # ─── Reverse Proxy (single entry point on port 80) ──────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: ams-proxy
    ports:
      - "${PROXY_PORT:-3000}:3000"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin
      - lecturer
    restart: unless-stopped
    networks:
      - ams-network

  # ─── Admin Frontend (internal only) ─────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_NAME: ${ADMIN_VITE_APP_BASE_NAME:-/admin/}
        VITE_APP_VERSION:   ${ADMIN_VITE_APP_VERSION:-v1.5.0}
        PUBLIC_URL:         ${ADMIN_PUBLIC_URL:-}
        GENERATE_SOURCEMAP: ${ADMIN_GENERATE_SOURCEMAP:-false}
    image: ams-web/admin:latest
    container_name: ams-admin
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - ams-network

  # ─── Lecturer Frontend (internal only) ──────────────────────────────────────
  lecturer:
    build:
      context: ./lecturer
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_NAME: ${LECTURER_VITE_APP_BASE_NAME:-/lecturer/}
        VITE_APP_VERSION:   ${LECTURER_VITE_APP_VERSION:-v1.5.0}
        PUBLIC_URL:         ${LECTURER_PUBLIC_URL:-}
        GENERATE_SOURCEMAP: ${LECTURER_GENERATE_SOURCEMAP:-false}
    image: ams-web/lecturer:latest
    container_name: ams-lecturer
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - ams-network

networks:
  ams-network:
    driver: bridge
