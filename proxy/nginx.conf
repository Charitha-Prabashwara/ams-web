server {
    listen 3000;
    server_name _;

    # Docker's internal DNS — resolves container names at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Backend API ────────────────────────────────────────────────────────────
    # http://host:3000/api/  →  ams-api:8080
    location /api/ {
        set $api http://ams-api:8080;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Admin frontend ─────────────────────────────────────────────────────────
    # http://host:3000/admin/  →  ams-admin:80
    location /admin/ {
        set $admin http://ams-admin:80;
        proxy_pass         $admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Lecturer frontend ──────────────────────────────────────────────────────
    # http://host:3000/lecturer/  →  ams-lecturer:80
    location /lecturer/ {
        set $lecturer http://ams-lecturer:80;
        proxy_pass         $lecturer;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Root redirect ──────────────────────────────────────────────────────────
    location = / {
        return 302 /admin/;
    }
}
