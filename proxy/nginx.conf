server {
    listen 3000;
    server_name _;

    # Docker's internal DNS — resolves container names at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Admin app ──────────────────────────────────────────────────────────────
    # Pass full path including /admin/ so the container serves from its subdir
    location /admin/ {
        set $admin http://ams-admin:80;
        proxy_pass         $admin;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Lecturer app ───────────────────────────────────────────────────────────
    location /lecturer/ {
        set $lecturer http://ams-lecturer:80;
        proxy_pass         $lecturer;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Root redirect ──────────────────────────────────────────────────────────
    location = / {
        return 302 /admin/;
    }
}
